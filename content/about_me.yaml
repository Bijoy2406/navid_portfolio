paragraphs:
  - Hi, I am Khondker Tamzidur Rahman. I am an undergraduate student at North South University, majoring in Computer Science and Engineering. I have a strong passion for technology, artificial intelligence, web development, photography, cinematography, and content editing. My interests lie in exploring innovative solutions, creating visually compelling content, and continuously learning new skills in both the tech and creative fields. Also I am passionate about exploring more and learn new things from my upcoming path.
  
blockquote: Driven by a curiosity to learn and improve, I continuously explore new tools and methodologies to enhance my work.
