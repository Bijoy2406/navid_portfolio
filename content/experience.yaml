jobs:
  - title: Public Relations Office, North South University
    company: Official Photographer & PR Content Producer
    period: "2024 - Present"
    description: >
      As the Official Photographer and PR Content Producer for NSU Digital, the official page of North South
      University, I specialize in capturing, producing, and curating high-quality photo and video content from
      various campus events. I handle media monitoring and work closely with journalists to ensure timely
      coverage and accurate representation of the university’s activities across digital and traditional platforms.
      Through this role, I have gained practical experience in photojournalism and contributed visual content for
      news portals, covering meetings, corporate shoots, workshops, and special occasions to maintain and
      promote a strong, professional image for the university’s community and audience.

  - title: Snapshot Stories
    company: Founder & Head of Operations
    period: "2024 - Present"
    description: >
      Snapshot Production and Snapshot Stories are professional photography and cinematography brands specializing in corporate shoots, fashion, branding, weddings, concerts, and events. As the Founder, Head of Operations and Chief Photographer, I lead creative direction, manage client projects, and provide direction to teams to ensure smooth production workflows. I deliver high-quality visual storytelling for brands and individuals, making sure every project captures unique stories with professional standards.
