  - title: NSU ACM Student Chapter
    company: Founding Coordinator & Sub-Executive
    period: "2024 - 2026"
    description: >
      As the Founding Coordinator of the Media & Documentation and Sub-Executive of Team Promotions at NSU
      ACM Student Chapter, I led initiatives in public relations, event documentation, and promotional content
      creation. I played a key role in building the group from the ground up, coordinated media coverage,
      sponsorship materials, and press releases to enhance the chapter's visibility. I progressed from probationary
      member to leadership roles, and developed strong leadership, teamwork, and communication skills within a
      dynamic student community.
    
  - title: English Olympiad
    company: Campus Ambassador & Organizer
    period: "2023 - 2025"
    description: >
      As an Organizer & Campus Ambassador, I played a pivotal role in the committee dedicated to the growth and
      success of the English Olympiad. Through effective coordination, engagement, and event organization, I
      contributed to its overall success and positive impact on campus. Additionally, I organized the event and
      served as an adjudicator for the final round of Season 3.
    
  - title: National STEAM Olympiad
    company: Campus Ambassador
    period: "2023 - 2025"
    description: >
      Working as a Campus Ambassador for the National STEAM Olympiad, I represented the organization at my
      university, promoted and organized events related to science, technology, engineering, arts, and
      mathematics. I effectively communicated program details, engaged students, and helped facilitate a
      meaningful educational experience for participants. It was a great success for me, and I was honored to be
      selected as one of the top 30 nominee ambassadors among 1,300 others nationwide.
    
